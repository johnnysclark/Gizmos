<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Trails</title>
  <link rel="stylesheet" href="css/main.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <h1 class="logo">Skill Trails</h1>
    </div>
    <div class="header-center">
      <div class="trail-selector">
        <label for="trail-select">Trail:</label>
        <select id="trail-select">
          <option value="">All Tutorials</option>
        </select>
      </div>
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search tutorials..." autocomplete="off">
      </div>
    </div>
    <div class="header-right">
      <div class="legend" id="legend"></div>
    </div>
  </header>

  <main class="main">
    <div id="graph-container"></div>

    <aside class="sidebar" id="sidebar">
      <button class="sidebar-close" id="sidebar-close" aria-label="Close panel">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
        </svg>
      </button>
      <div class="sidebar-content" id="sidebar-content"></div>
    </aside>
  </main>

  <div class="zoom-controls">
    <button id="zoom-in" aria-label="Zoom in">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14"/><path d="M5 12h14"/>
      </svg>
    </button>
    <button id="zoom-fit" aria-label="Fit to screen">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/>
      </svg>
    </button>
    <button id="zoom-out" aria-label="Zoom out">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14"/>
      </svg>
    </button>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
