<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Waves — Gizmos</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #0f1117; }
    canvas { display: block; }
    .back-link {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      color: #8b90a8;
      text-decoration: none;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      padding: 6px 12px;
      background: rgba(26, 29, 39, 0.8);
      border: 1px solid #2e3348;
      border-radius: 6px;
      backdrop-filter: blur(8px);
      transition: color 0.15s, border-color 0.15s;
    }
    .back-link:hover { color: #e4e6f0; border-color: #6c8aff; }
  </style>
</head>
<body>
  <a href="../../index.html" class="back-link">&larr; Gizmos</a>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 30, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setClearColor(0x0f1117);
    document.body.appendChild(renderer.domElement);

    const count = 80;
    const spacing = 1.2;
    const particles = [];
    const geometry = new THREE.SphereGeometry(0.2, 12, 12);

    for (let x = 0; x < count; x++) {
      for (let z = 0; z < count; z++) {
        const material = new THREE.MeshStandardMaterial({
          color: new THREE.Color().setHSL(0.6 + (x + z) / (count * 2) * 0.2, 0.7, 0.55),
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.x = (x - count / 2) * spacing;
        mesh.position.z = (z - count / 2) * spacing;
        mesh.userData = { ox: mesh.position.x, oz: mesh.position.z };
        scene.add(mesh);
        particles.push(mesh);
      }
    }

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404060, 0.5));

    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / innerWidth - 0.5) * 2;
      mouseY = (e.clientY / innerHeight - 0.5) * 2;
    });

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    function animate(t) {
      requestAnimationFrame(animate);
      const time = t * 0.001;

      for (const p of particles) {
        const d = Math.sqrt(p.userData.ox ** 2 + p.userData.oz ** 2);
        p.position.y = Math.sin(d * 0.3 - time * 2) * 3 + Math.sin(d * 0.15 + time) * 2;
        const scale = 0.6 + (p.position.y + 5) / 10 * 0.8;
        p.scale.setScalar(Math.max(0.2, scale));
      }

      camera.position.x += (mouseX * 30 - camera.position.x) * 0.02;
      camera.position.y += (-mouseY * 10 + 30 - camera.position.y) * 0.02;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }
    animate(0);
  </script>
</body>
</html>
